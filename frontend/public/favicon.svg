<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer Frame -->
  <circle cx="16" cy="16" r="14" fill="#1a1c1c" />
  <circle cx="16" cy="16" r="12" fill="none" stroke="#e1e2e5" stroke-width="2" />
  <!-- GLaDOS Eye Structure -->
  <circle cx="16" cy="16" r="8" fill="#41484d" />
  <!-- Glowing Pupil -->
